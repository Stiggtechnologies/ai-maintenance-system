# Dependency vulnerability + update management (ISO A.8.8, SOC 2 CC7.1).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Majors are deliberate migration projects (React 19, Tailwind 4, Vite 8…),
    # not auto-merge material — CI proved the bundled majors break the build.
    # Keep the continuous stream to minors/patches; do majors intentionally.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
