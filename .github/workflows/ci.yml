name: CI

# Gates every PR and push to main on:
#   1. lint (src is a zero-error zone) + typecheck
#   2. unit tests (vitest)
#   3. the full Supabase migration chain applying from scratch, then a live
#      smoke test: seeded demo login → RLS-scoped read → app-shell RPC.
#
# NOTE: the legacy Playwright golden-path job was removed — it targets the
# pre-baseline schema (Axium org, legacy seeds, old orchestration tables).
# Reviving it against the current chain is tracked in docs/gtm-readiness.md.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: ESLint (src — zero-error zone)
        run: npx eslint src --max-warnings 5

      - name: TypeScript
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build
        run: npm run build

  vitest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --no-audit --no-fund
      - run: npm run test

  migrations:
    name: Migration chain + seeded auth smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Start local Supabase (applies full migration chain)
        run: supabase start

      - name: Smoke — demo login, RLS read, RPC
        run: |
          set -euo pipefail
          trap 'echo "FAILED at line $LINENO: $BASH_COMMAND"' ERR
          set -x
          eval "$(supabase status -o env | grep -E '^(ANON_KEY|API_URL)=')"
          echo "API_URL=$API_URL anon_len=${#ANON_KEY}"
          # GoTrue can lag supabase start — retry the login briefly. Every
          # command in the loop is failure-tolerant so set -e can't kill the
          # retry itself.
          TOKEN=""
          for i in $(seq 1 12); do
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/auth/v1/health" -H "apikey: $ANON_KEY" || echo "conn-fail")
            RESP=$(curl -s "$API_URL/auth/v1/token?grant_type=password" \
              -H "apikey: $ANON_KEY" -H "Content-Type: application/json" \
              -d '{"email":"demo@syncai.ca","password":"Demo123!@#"}' || true)
            TOKEN=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || true)
            if [ -n "$TOKEN" ]; then break; fi
            echo "attempt $i: auth health=$HEALTH resp=$(echo "$RESP" | head -c 200)"
            sleep 5
          done
          test -n "$TOKEN"
          COUNT=0
          for i in $(seq 1 6); do
            BODY=$(curl -s "$API_URL/rest/v1/recommendations?select=id" \
              -H "apikey: $ANON_KEY" -H "Authorization: Bearer $TOKEN" || true)
            COUNT=$(echo "$BODY" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo 0)
            if [ "$COUNT" -ge 4 ]; then break; fi
            echo "attempt $i: rls read count=$COUNT body=$(echo "$BODY" | head -c 200)"
            sleep 5
          done
          test "$COUNT" -ge 4
          ROLE=$(curl -s -X POST "$API_URL/rest/v1/rpc/get_current_user_context" \
            -H "apikey: $ANON_KEY" -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" -d '{}' \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['role'])")
          test "$ROLE" = "reliability_engineer"
          echo "Smoke passed: login + RLS ($COUNT recs) + RPC ($ROLE)"

      - name: Smoke — continuous agent loop
        run: |
          set -euo pipefail
          trap 'echo "FAILED at line $LINENO: $BASH_COMMAND"' ERR
          eval "$(supabase status -o env | grep -E '^(API_URL|SERVICE_ROLE_KEY)=')"
          LOOP=$(curl -s -X POST "$API_URL/rest/v1/rpc/run_agent_loop" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" -d '{}' || true)
          CREATED=$(echo "$LOOP" | python3 -c "import sys,json;print(json.load(sys.stdin).get('recommendations_created',-1))" 2>/dev/null || echo -1)
          FLAGGED=$(echo "$LOOP" | python3 -c "import sys,json;print(json.load(sys.stdin).get('sensors_flagged',-1))" 2>/dev/null || echo -1)
          echo "loop: flagged=$FLAGGED created=$CREATED"
          test "$FLAGGED" -ge 3
          test "$CREATED" -ge 0
          # second run must be idempotent
          AGAIN=$(curl -s -X POST "$API_URL/rest/v1/rpc/run_agent_loop" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" -d '{}' || true)
          SECOND=$(echo "$AGAIN" | python3 -c "import sys,json;print(json.load(sys.stdin).get('recommendations_created',-1))" 2>/dev/null || echo -1)
          test "$SECOND" = "0"
          echo "Agent-loop smoke passed: flagged=$FLAGGED first=$CREATED second=$SECOND (idempotent)"

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
