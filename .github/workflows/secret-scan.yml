# Secret scanning — prevents credentials from ever entering the repo.
# ISO A.8.4 (access to source code) / A.8.24, SOC 2 CC6.7.
name: Secret scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
