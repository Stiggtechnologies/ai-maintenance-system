name: Deploy migrations

# Pushes the deterministic migration chain and governed production edge functions
# to the hardened SyncAI cloud project after protected changes land on main.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/agent-loop-enrich/**"
      - "supabase/functions/ai-agent-processor/**"
      - "supabase/functions/autonomous-orchestrator/**"
      - "supabase/functions/onboarding-enrich/**"
  workflow_dispatch:

concurrency:
  group: deploy-migrations
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_ID: pjvoswbwomesuwhygpby

jobs:
  push-migrations:
    name: supabase db push and edge deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: supabase/setup-cli@v3
        with:
          version: 2.75.0

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        run: |
          supabase functions deploy agent-loop-enrich --no-verify-jwt
          supabase functions deploy ai-agent-processor
          supabase functions deploy autonomous-orchestrator
          supabase functions deploy onboarding-enrich --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
